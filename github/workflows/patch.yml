name: Build YouTubeX
on:
#  push:
  workflow_dispatch:
jobs:
  patch:
    name: Build YouTubeX
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up jdk
        uses: actions/setup-java@v3.10.0
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Delete older releases
        uses: dev-drprasad/delete-older-releases@v0.2.1
        with:
          keep_latest: 0
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Applying patches
        run: bash main.sh  
        
      - name: Generate release info
        run: | 
          echo "
          [Update Changelog](https://github.com/inotia00/revanced-patches/releases/latest)
          > [!CAUTION]
          > [microG](https://github.com/inotia00/VancedMicroG/releases/download/v0.2.27.230755/microg.apk) is required for YouTube to work. Install it first.
          > When updating from v18.33.40 or lower to v18.34.xx or later, a clean install is recommended.
          "> ${{ github.workspace }}-CHANGELOG.txt
             
      - name: Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          files: youtube-extended*.apk 
          tag_name: latest
          body_path: ${{ github.workspace }}-CHANGELOG.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1
